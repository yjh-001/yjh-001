<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多轮对话助手 - 阿里云千问</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .title {
            text-align: center;
            margin-bottom: 10px;
        }
        .desc {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        .api-key {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .chat-box {
            height: 500px;
            background: white;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #ddd;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
        }
        .user {
            background: #e3f2fd;
            margin-left: auto;
        }
        .bot {
            background: #f1f1f1;
            margin-right: auto;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
        }
        .loading {
            color: #007bff;
            font-style: italic;
        }
        .error {
            color: red;
        }
        .clear-btn {
            background: #6c757d;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1 class="title">多轮对话助手</h1>
    <p class="desc">基于阿里云百炼 qwen3.6-plus 纯前端实现 | 支持多轮上下文对话</p>

    <input type="password" class="api-key" id="apiKey" placeholder="请输入阿里云百炼 API Key">

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题...">
        <button id="sendBtn">发送</button>
    </div>

    <button class="clear-btn" id="clearBtn">清空对话</button>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        // 对话历史（多轮核心）
        let messages = [];

        // 发送
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const key = apiKeyInput.value.trim();
            const content = userInput.value.trim();
            if (!key || !content) return;

            // 加入用户消息
            addMessage('user', content);
            userInput.value = '';

            // 加入历史
            messages.push({ role: 'user', content });

            // 加载提示
            addMessage('bot', '思考中...', 'loading');
            sendBtn.disabled = true;

            try {
                const res = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'qwen3.6-plus',
                        messages: messages
                    })
                });

                const data = await res.json();
                // 移除加载
                chatBox.removeChild(chatBox.lastChild);

                if (!res.ok) throw new Error(data.error?.message || '请求失败');

                const reply = data.choices[0].message.content;
                addMessage('bot', reply);
                messages.push({ role: 'assistant', content: reply });
            } catch (err) {
                chatBox.removeChild(chatBox.lastChild);
                addMessage('bot', '错误：' + err.message, 'error');
            } finally {
                sendBtn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // 添加消息
        function addMessage(role, text, className = '') {
            const div = document.createElement('div');
            div.className = `message ${role} ${className}`;
            div.innerText = text;
            chatBox.appendChild(div);
        }

        // 清空
        clearBtn.addEventListener('click', () => {
            messages = [];
            chatBox.innerHTML = '';
        });
    </script>
</body>
</html>
